<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Engine - Transcriptor Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .prose strong { color: #0f172a; font-weight: 800; background: #eef2ff; padding: 0 2px; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Simulación de iconos de Lucide ya que estamos en CDN
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [transcript, setTranscript] = useState('');
            const [notes, setNotes] = useState('');
            const [view, setView] = useState('transcript');
            const [loading, setLoading] = useState(false);
            const [progress, setProgress] = useState(0);
            const [aiProcessing, setAiProcessing] = useState(false);
            const [status, setStatus] = useState('');
            const [history, setHistory] = useState([]);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [copied, setCopied] = useState(false);

            const apiKey = ""; // La plataforma la gestiona automáticamente

            useEffect(() => {
                const saved = localStorage.getItem('study_history');
                if (saved) setHistory(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('study_history', JSON.stringify(history));
            }, [history]);

            // Lógica de conversión AudioBuffer a WAV ligero
            const audioBufferToWav = (buffer) => {
                const numOfChan = 1;
                const length = buffer.length * 2 + 44;
                const bufferArr = new ArrayBuffer(length);
                const view = new DataView(bufferArr);
                let pos = 0;
                const setUint32 = (data) => { view.setUint32(pos, data, true); pos += 4; };
                const setUint16 = (data) => { view.setUint16(pos, data, true); pos += 2; };
                setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); setUint32(0x20746d66);
                setUint32(16); setUint16(1); setUint16(numOfChan); setUint32(buffer.sampleRate);
                setUint32(buffer.sampleRate * 2); setUint16(2); setUint16(16); setUint32(0x61746164);
                setUint32(length - pos - 4);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    let sample = Math.max(-1, Math.min(1, data[i]));
                    view.setInt16(pos, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                    pos += 2;
                }
                return new Blob([bufferArr], { type: 'audio/wav' });
            };

            const callGemini = async (prompt, audioData = null, mimeType = null) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const parts = [{ text: prompt }];
                if (audioData) parts.push({ inlineData: { mimeType, data: audioData } });
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts }] })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true); setTranscript(''); setNotes(''); setView('transcript');
                setStatus('Procesando audio...');
                try {
                    const audioCtx = new AudioContext();
                    const arrayBuffer = await file.arrayBuffer();
                    const decodedData = await audioCtx.decodeAudioData(arrayBuffer);
                    const duration = decodedData.duration;
                    const segmentDuration = 600; 
                    const numSegments = Math.ceil(duration / segmentDuration);
                    let fullText = "";

                    for (let i = 0; i < numSegments; i++) {
                        const start = i * segmentDuration;
                        const end = Math.min((i + 1) * segmentDuration, duration);
                        setStatus(`Analizando segmento ${i + 1} de ${numSegments}...`);
                        setProgress(Math.round(((i + 1) / numSegments) * 100));

                        const offlineCtx = new OfflineAudioContext(1, (end - start) * 8000, 8000);
                        const source = offlineCtx.createBufferSource();
                        source.buffer = decodedData;
                        source.connect(offlineCtx.destination);
                        source.start(0, start, end - start);
                        const rendered = await offlineCtx.startRendering();
                        const blob = audioBufferToWav(rendered);
                        
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        const base64 = await new Promise(r => reader.onload = () => r(reader.result.split(',')[1]));
                        
                        const text = await callGemini("Transcribe este audio literalmente. Usa puntuación correcta.", base64, "audio/wav");
                        fullText += text + " ";
                        setTranscript(fullText);
                    }
                    setStatus('Completado.');
                } catch (err) { setStatus('Error en el proceso.'); } finally { setLoading(false); }
            };

            const generateStudyNotes = async () => {
                setAiProcessing(true); setStatus('Generando apuntes estructurados...');
                try {
                    const prompt = `Analiza esta transcripción y crea un documento de estudio con títulos (#), subtítulos (##) y conceptos clave en negritas (**). Incluye: Glosario, Desarrollo y Autoevaluación. No uses emojis. Texto: ${transcript}`;
                    const res = await callGemini(prompt);
                    setNotes(res); setView('notes');
                } catch (e) { setStatus('Error en IA.'); } finally { setAiProcessing(false); }
            };

            const copyToClipboard = () => {
                const text = view === 'transcript' ? transcript : notes;
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const saveItem = () => {
                const newItem = { id: Date.now(), title: transcript.slice(0, 30) + "...", transcript, notes, date: new Date().toLocaleDateString() };
                setHistory([newItem, ...history]);
            };

            const renderFormatted = (text) => {
                return text.split('\n').map((line, i) => {
                    if (line.startsWith('# ')) return <h1 key={i} class="text-3xl font-black mb-6 border-b pb-2">{line.replace('# ', '')}</h1>;
                    if (line.startsWith('## ')) return <h2 key={i} class="text-xl font-bold mt-8 mb-4 flex items-center gap-2"><div class="w-1.5 h-6 bg-indigo-600 rounded-full"></div>{line.replace('## ', '')}</h2>;
                    
                    const parts = line.split(/(\*\*.*?\*\*)/g);
                    return <p key={i} class="mb-4 text-slate-700 leading-relaxed">
                        {parts.map((p, pi) => p.startsWith('**') ? <strong key={pi}>{p.slice(2, -2)}</strong> : p)}
                    </p>;
                });
            };

            return (
                <div className="min-h-screen flex text-slate-900 overflow-hidden">
                    <aside className={`${isSidebarOpen ? 'w-80' : 'w-0'} bg-white border-r transition-all duration-300 flex flex-col shrink-0`}>
                        <div className="p-6 border-b font-bold text-[10px] tracking-widest uppercase text-slate-400">Biblioteca</div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            {history.map(h => (
                                <div key={h.id} onClick={() => {setTranscript(h.transcript); setNotes(h.notes); setView(h.notes ? 'notes' : 'transcript');}} className="p-4 border rounded-2xl hover:border-indigo-500 cursor-pointer transition-all bg-white shadow-sm">
                                    <span className="text-[10px] font-bold text-slate-400">{h.date}</span>
                                    <p className="text-xs font-bold truncate mt-1">{h.title}</p>
                                </div>
                            ))}
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="bg-white border-b px-8 py-5 flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 hover:bg-slate-100 rounded-lg"><Icon name="menu" /></button>
                                <div className="flex items-center gap-2">
                                    <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-200"><Icon name="brain-circuit" /></div>
                                    <h1 className="text-sm font-black tracking-tighter">ESTUDIO IA</h1>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto px-6 py-10">
                            <div className="max-w-4xl mx-auto">
                                {!transcript && !loading && (
                                    <label className="block cursor-pointer group">
                                        <div className="border-2 border-dashed border-slate-300 rounded-[3rem] p-24 flex flex-col items-center hover:border-indigo-500 hover:bg-white transition-all">
                                            <div className="bg-white p-6 rounded-3xl shadow-sm border group-hover:shadow-xl transition-all"><Icon name="upload" size={40} className="text-indigo-600" /></div>
                                            <span className="text-2xl font-black mt-6">Cargar Audio</span>
                                        </div>
                                        <input type="file" className="hidden" accept="audio/*" onChange={handleFileUpload} />
                                    </label>
                                )}

                                {(loading || aiProcessing) && (
                                    <div className="bg-white p-8 rounded-3xl border shadow-sm mb-10">
                                        <div className="flex justify-between items-end mb-4">
                                            <span className="text-[10px] font-black text-indigo-600 uppercase tracking-widest flex items-center gap-2"><Icon name="loader-2" className="animate-spin" size={14} /> {status}</span>
                                            <span className="text-3xl font-black">{progress}%</span>
                                        </div>
                                        <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                            <div className="h-full bg-indigo-600 transition-all duration-500" style={{ width: `${progress}%` }}></div>
                                        </div>
                                    </div>
                                )}

                                {(transcript || notes) && !loading && !aiProcessing && (
                                    <div className="space-y-6">
                                        <div className="bg-white p-2 rounded-2xl border shadow-sm flex gap-2">
                                            <div className="bg-slate-100 p-1 rounded-xl flex flex-1">
                                                <button onClick={() => setView('transcript')} className={`flex-1 py-2 rounded-lg font-bold text-[10px] uppercase tracking-wider ${view === 'transcript' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}>Literal</button>
                                                <button onClick={notes ? () => setView('notes') : generateStudyNotes} className={`flex-1 py-2 rounded-lg font-bold text-[10px] uppercase tracking-wider flex items-center justify-center gap-2 ${view === 'notes' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}><Icon name="sparkles" size={12} /> Apuntes</button>
                                            </div>
                                            <div className="flex gap-2 px-2">
                                                <button onClick={saveItem} className="p-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-100"><Icon name="save" size={18} /></button>
                                                <button onClick={copyToClipboard} className="p-3 border rounded-xl hover:bg-slate-50 text-slate-500">{copied ? <Icon name="check-circle" className="text-emerald-500" size={18} /> : <Icon name="copy" size={18} />}</button>
                                                <button onClick={() => {setTranscript(''); setNotes('');}} className="p-3 border rounded-xl hover:bg-red-50 text-slate-500 hover:text-red-500"><Icon name="trash-2" size={18} /></button>
                                            </div>
                                        </div>

                                        <div className="bg-white border rounded-[3rem] p-12 md:p-20 shadow-2xl relative min-h-[600px]">
                                            <div className="absolute top-0 left-0 w-2 h-full bg-indigo-600 opacity-10"></div>
                                            <div className="text-lg leading-[1.8] text-slate-800">
                                                {view === 'transcript' ? <div className="whitespace-pre-wrap">{transcript}</div> : <div>{renderFormatted(notes)}</div>}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
