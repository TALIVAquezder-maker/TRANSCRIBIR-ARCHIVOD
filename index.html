<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Pro - Transcriptor Académico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .notes-container strong { color: #0f172a; font-weight: 800; background-color: #eef2ff; padding: 0 2px; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // Tu API Key integrada
            const apiKey = "AIzaSyCrIhvy6CY6-FiF0u7kIdpAgc_rMdG8vec"; 

            const [transcript, setTranscript] = useState('');
            const [notes, setNotes] = useState('');
            const [view, setView] = useState('transcript');
            const [loading, setLoading] = useState(false);
            const [progress, setProgress] = useState(0);
            const [status, setStatus] = useState('');
            const [history, setHistory] = useState([]);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('uagrm_study_vault');
                if (saved) setHistory(JSON.parse(saved));
                setTimeout(() => lucide.createIcons(), 500);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [transcript, notes, view, loading, history, isSidebarOpen]);

            const audioBufferToWav = (buffer) => {
                const numOfChan = 1;
                const length = buffer.length * 2 + 44;
                const bufferArr = new ArrayBuffer(length);
                const view = new DataView(bufferArr);
                let pos = 0;
                const setUint32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
                const setUint16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
                setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); setUint32(0x20746d66);
                setUint32(16); setUint16(1); setUint16(numOfChan); setUint32(buffer.sampleRate);
                setUint32(buffer.sampleRate * 2); setUint16(2); setUint16(16); setUint32(0x61746164);
                setUint32(length - pos - 4);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    let s = Math.max(-1, Math.min(1, data[i]));
                    view.setInt16(pos, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                    pos += 2;
                }
                return new Blob([bufferArr], { type: 'audio/wav' });
            };

            const callGemini = async (prompt, audioData = null, mimeType = null) => {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                ...(audioData ? [{ inlineData: { mimeType, data: audioData } }] : [])
                            ]
                        }]
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data.candidates[0].content.parts[0].text;
            };

            const handleFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true); setTranscript(''); setNotes(''); setProgress(5);
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const arrayBuffer = await file.arrayBuffer();
                    const decoded = await audioCtx.decodeAudioData(arrayBuffer);
                    const segDur = 600; 
                    const totalSegs = Math.ceil(decoded.duration / segDur);
                    let fullText = "";

                    for (let i = 0; i < totalSegs; i++) {
                        setStatus(`Procesando bloque ${i+1} de ${totalSegs}...`);
                        const start = i * segDur;
                        const end = Math.min((i + 1) * segDur, decoded.duration);
                        const offlineCtx = new OfflineAudioContext(1, (end - start) * 8000, 8000);
                        const source = offlineCtx.createBufferSource();
                        source.buffer = decoded;
                        source.connect(offlineCtx.destination);
                        source.start(0, start, end - start);
                        const rendered = await offlineCtx.startRendering();
                        const blob = audioBufferToWav(rendered);
                        const base64 = await new Promise(r => {
                            const rd = new FileReader();
                            rd.readAsDataURL(blob);
                            rd.onload = () => r(rd.result.split(',')[1]);
                        });
                        const res = await callGemini("Transcribe este audio de clase literalmente en español.", base64, "audio/wav");
                        fullText += res + " ";
                        setTranscript(fullText);
                        setProgress(Math.round(((i + 1) / totalSegs) * 100));
                    }
                    setStatus('¡Transcripción lista!');
                } catch (err) { setStatus('Error en la API o Audio'); } finally { setLoading(false); }
            };

            const makeNotes = async () => {
                setLoading(true); setStatus('IA creando apuntes estructurados...');
                try {
                    const prompt = `Analiza la transcripción y crea apuntes de clase profesionales. Usa # para Títulos, ## para Subtítulos. Resalta conceptos técnicos con **negritas**. No uses emojis. Estructura: 1. Resumen. 2. Glosario. 3. Temas detallados. 4. Preguntas de examen. Texto: ${transcript}`;
                    const res = await callGemini(prompt);
                    setNotes(res); setView('notes');
                    const historyItem = { id: Date.now(), title: "Clase " + new Date().toLocaleDateString(), transcript, notes: res };
                    const newHist = [historyItem, ...history];
                    setHistory(newHist);
                    localStorage.setItem('uagrm_study_vault', JSON.stringify(newHist));
                } catch (e) { setStatus('Error en IA'); } finally { setLoading(false); }
            };

            const copy = () => {
                const t = view === 'transcript' ? transcript : notes;
                const el = document.createElement('textarea');
                el.value = t;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true); setTimeout(() => setCopied(false), 2000);
            };

            const renderMD = (t) => {
                return t.split('\n').map((line, i) => {
                    if (line.startsWith('# ')) return <h1 key={i} className="text-3xl font-black text-slate-900 mb-6 border-b-4 border-indigo-600 pb-2">{line.replace('# ', '')}</h1>;
                    if (line.startsWith('## ')) return <h2 key={i} className="text-xl font-bold text-indigo-700 mt-8 mb-4 border-l-4 border-indigo-600 pl-3">{line.replace('## ', '')}</h2>;
                    const parts = line.split(/(\*\*.*?\*\*)/g);
                    return <div key={i} className="mb-4 text-slate-700 leading-relaxed text-lg text-justify">
                        {parts.map((p, pi) => p.startsWith('**') ? <strong key={pi}>{p.slice(2, -2)}</strong> : p)}
                    </div>;
                });
            };

            return (
                <div className="min-h-screen flex">
                    <aside className={`${isSidebarOpen ? 'w-72' : 'w-0'} bg-white border-r transition-all duration-300 overflow-hidden flex flex-col shrink-0 shadow-lg`}>
                        <div className="p-6 border-b flex items-center gap-2 font-bold text-xs uppercase tracking-widest text-slate-400"><i data-lucide="library"></i> Biblioteca</div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            {history.map(h => (
                                <div key={h.id} onClick={() => {setTranscript(h.transcript); setNotes(h.notes); setView('notes');}} className="p-4 border rounded-xl hover:bg-indigo-50 cursor-pointer transition-all">
                                    <p className="text-xs font-bold text-slate-800">{h.title}</p>
                                </div>
                            ))}
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="bg-white border-b px-8 py-4 flex justify-between items-center shadow-sm">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 hover:bg-slate-100 rounded-lg"><i data-lucide="menu"></i></button>
                                <div className="flex items-center gap-2">
                                    <div className="bg-indigo-600 p-1.5 rounded-lg text-white shadow-md"><i data-lucide="brain-circuit"></i></div>
                                    <h1 className="text-sm font-black tracking-tighter uppercase">Estudio IA Pro</h1>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto px-6 py-10 bg-[#f8fafc]">
                            <div className="max-w-4xl mx-auto">
                                {!transcript && !loading && (
                                    <label className="block cursor-pointer group">
                                        <div className="border-4 border-dashed border-slate-200 rounded-[2rem] p-24 flex flex-col items-center hover:border-indigo-500 hover:bg-white transition-all shadow-sm">
                                            <div className="bg-indigo-100 p-6 rounded-2xl mb-6 group-hover:scale-110 transition-transform"><i data-lucide="upload" className="text-indigo-600 w-10 h-10"></i></div>
                                            <span className="text-2xl font-black text-slate-800">Cargar Grabación</span>
                                        </div>
                                        <input type="file" className="hidden" accept="audio/*" onChange={handleFile} />
                                    </label>
                                )}

                                {(loading || progress > 0) && (
                                    <div className="mb-10 bg-white p-8 rounded-[2rem] border shadow-sm">
                                        <div className="flex justify-between items-end mb-4">
                                            <span className="text-[10px] font-black text-indigo-600 uppercase tracking-widest flex items-center gap-2">
                                                <i data-lucide="loader-2" className="animate-spin w-4 h-4"></i> {status}
                                            </span>
                                            <span className="text-4xl font-black">{progress}%</span>
                                        </div>
                                        <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                            <div className="h-full bg-indigo-600 transition-all duration-700" style={{ width: `${progress}%` }}></div>
                                        </div>
                                    </div>
                                )}

                                {(transcript || notes) && !loading && (
                                    <div className="space-y-6">
                                        <div className="flex gap-2 p-1 bg-white rounded-2xl border shadow-sm max-w-fit mx-auto">
                                            <button onClick={() => setView('transcript')} className={`px-6 py-2 rounded-xl font-bold text-xs uppercase tracking-widest transition-all ${view === 'transcript' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500'}`}>Literal</button>
                                            <button onClick={notes ? () => setView('notes') : makeNotes} className={`px-6 py-2 rounded-xl font-bold text-xs uppercase tracking-widest flex items-center gap-2 transition-all ${view === 'notes' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500'}`}><i data-lucide="sparkles" className="w-4 h-4"></i> Apuntes</button>
                                            <button onClick={copy} className="p-2 border rounded-xl hover:bg-slate-50">{copied ? <i data-lucide="check-circle" className="text-emerald-500 w-5 h-5"></i> : <i data-lucide="copy" className="w-5 h-5"></i>}</button>
                                        </div>

                                        <div className="bg-white border rounded-[2.5rem] p-12 md:p-20 shadow-2xl relative min-h-[600px] notes-container">
                                            {view === 'transcript' ? (
                                                <div className="whitespace-pre-wrap text-slate-800 leading-relaxed text-lg text-justify">{transcript}</div>
                                            ) : (
                                                <div>{renderMD(notes)}</div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
